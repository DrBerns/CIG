<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Capital Injury Group — Outcome Assessments</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#7b1a2e; --blue:#9e1b32; --lblue:#faeff1;
  --green:#7b1a2e; --lgreen:#faeff1;
  --red:#c0392b; --lred:#fdf3f3;
  --gray:#5a6a7d; --lgray:#f4f6f9; --border:#cdd5e0;
  --white:#fff; --radius:14px; --shadow:0 4px 24px rgba(123,26,46,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'DM Sans',sans-serif;background:var(--lgray);color:#1a2535;min-height:100vh;}
button{font-family:inherit;}

.hdr{background:var(--white);border-bottom:3px solid var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 18px rgba(123,26,46,0.09);}
.hdr-inner{max-width:860px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.brand-mark{line-height:1;}
.brand-mark .sp,.brand-mark .me,.brand-mark .d{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.brand-mark .sp,.brand-mark .d{color:var(--navy);}
.brand-mark .me{color:var(--green);}
.brand-sub{font-size:10.5px;color:var(--gray);margin-top:2px;letter-spacing:0.2px;text-transform:uppercase;font-weight:600;}
.hdr-right{text-align:right;}
.hdr-step-lbl{font-size:10.5px;color:var(--gray);}
.hdr-step-name{font-size:13.5px;font-weight:700;color:var(--navy);margin-top:1px;}
.prog-dots{display:flex;gap:4px;padding:0 20px 10px;max-width:860px;margin:0 auto;}
.dot{height:5px;border-radius:3px;background:var(--border);flex:1;transition:background 0.3s;}
.dot.done{background:rgba(123,26,46,0.55);}
.dot.active{background:var(--navy);}

.stage{max-width:860px;margin:22px auto;padding:0 20px 140px;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.card-hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);padding:20px 24px 16px;color:var(--white);}
.card-hdr h1{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;line-height:1.2;}
.card-hdr h2{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:400;margin-bottom:3px;}
.card-hdr p{font-size:13px;opacity:0.85;line-height:1.5;margin-top:4px;}
.card-body{padding:22px 24px;}

.fg{display:grid;gap:14px;}
.g2{grid-template-columns:1fr 1fr;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.8px;}
.fi{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;font-size:16px;font-family:'DM Sans',sans-serif;color:#1a2535;background:var(--lgray);outline:none;transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;width:100%;min-height:48px;}
.fi:focus{border-color:var(--navy);background:var(--white);box-shadow:0 0 0 3px rgba(123,26,46,0.12);}

.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--navy);margin:18px 0 10px;padding-bottom:5px;border-bottom:2px solid var(--lblue);}

.ck-list{display:grid;gap:9px;}
.brand-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.brand-btn{padding:14px 16px;border:1.5px solid var(--border);border-radius:11px;background:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#1a2535;text-align:center;transition:all 0.15s;display:flex;flex-direction:column;gap:3px;align-items:center;line-height:1.2;}
.brand-btn .brand-sub{font-size:11px;font-weight:500;color:var(--gray);text-transform:none;letter-spacing:0;}
.brand-btn:hover{border-color:var(--navy);}
.brand-btn.on{border-color:var(--navy);background:var(--lblue);color:var(--navy);}
.brand-btn.on .brand-sub{color:var(--navy);}
.ck{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1.5px solid var(--border);border-radius:11px;cursor:pointer;user-select:none;min-height:54px;background:var(--white);transition:all 0.15s;}
.ck:active{transform:scale(0.995);}
.ck input[type=checkbox]{width:22px;height:22px;accent-color:var(--navy);cursor:pointer;flex-shrink:0;}
.ck-text{font-size:15.5px;line-height:1.35;color:#1a2535;flex:1;}
.ck-text .ck-sub{display:block;font-size:12px;color:var(--gray);margin-top:2px;font-weight:400;}
.ck.on{border-color:var(--navy);background:var(--lblue);}

/* Question block (used by each scored assessment) */
.q-block{padding:16px 0;border-top:1px solid #eef1f6;}
.q-block:first-of-type{border-top:none;padding-top:4px;}
.q-num{display:inline-block;background:var(--navy);color:#fff;font-weight:700;font-size:12px;min-width:26px;height:26px;border-radius:13px;text-align:center;line-height:26px;padding:0 8px;margin-right:8px;vertical-align:middle;}
.q-title{font-size:15.5px;font-weight:600;color:#1a2535;line-height:1.35;display:inline;}
.q-intro{font-size:13.5px;color:var(--gray);line-height:1.45;margin-top:6px;margin-left:34px;}

/* Radio choices (0-5 lists for ODI/NDI) */
.opt-list{display:grid;gap:8px;margin-top:12px;}
.opt{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--white);min-height:50px;transition:all 0.15s;}
.opt:active{transform:scale(0.995);}
.opt .opt-dot{width:22px;height:22px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;background:var(--white);position:relative;}
.opt .opt-dot::after{content:'';position:absolute;inset:4px;border-radius:50%;background:var(--navy);transform:scale(0);transition:transform 0.15s;}
.opt.on{border-color:var(--navy);background:var(--lblue);}
.opt.on .opt-dot{border-color:var(--navy);}
.opt.on .opt-dot::after{transform:scale(1);}
.opt-text{font-size:14.5px;line-height:1.35;color:#1a2535;}
.opt-text b{color:var(--navy);font-weight:700;margin-right:6px;}

/* Numeric scale (0–10, PDI / SPADI) */
.nrs-wrap{margin-top:14px;}
.nrs-row{display:flex;gap:5px;align-items:stretch;flex-wrap:nowrap;}
.nrs-btn{flex:1;min-width:0;height:50px;border:1.5px solid var(--border);border-radius:9px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;color:#1a2535;cursor:pointer;transition:all 0.12s;}
.nrs-btn:active{transform:scale(0.95);}
.nrs-btn.on{background:var(--navy);color:var(--white);border-color:var(--navy);}
.nrs-ends{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-top:6px;text-transform:uppercase;letter-spacing:0.6px;}

/* Likert 0–4 (UEFI / LEFS) */
.lik-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px;}
.lik-btn{padding:10px 6px;border:1.5px solid var(--border);border-radius:9px;background:var(--white);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--gray);line-height:1.25;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.12s;}
.lik-btn .lik-num{font-size:16px;font-weight:800;color:#1a2535;}
.lik-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.lik-btn.on .lik-num{color:#fff;}

/* Yes / Sometimes / No (HDI) */
.ysn-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px;}
.ysn-btn{padding:14px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;font-size:14.5px;font-weight:700;color:#1a2535;min-height:56px;transition:all 0.12s;}
.ysn-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* SPADI subscale heading */
.sub-head{margin:14px 0 4px;padding:10px 14px;background:var(--lblue);border-left:4px solid var(--navy);border-radius:8px;font-weight:700;color:var(--navy);font-size:14px;}
.sub-head-intro{font-size:12.5px;color:var(--gray);margin-top:3px;font-weight:500;}

/* Bottom bar */
.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:2px solid var(--navy);padding:12px 20px;box-shadow:0 -4px 18px rgba(123,26,46,0.10);z-index:90;}
.navbar-inner{max-width:860px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.navbar-status{font-size:12px;color:var(--gray);}
.navbar-status b{color:var(--navy);}
.btn-row{display:flex;gap:10px;}
.btn{padding:14px 24px;border-radius:11px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;letter-spacing:0.2px;min-height:50px;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-navy{background:var(--navy);color:var(--white);box-shadow:0 3px 12px rgba(123,26,46,0.25);}
.btn-navy:hover:not(:disabled){background:#153e82;}
.btn-ghost{background:var(--lgray);color:var(--gray);border:1.5px solid var(--border);}
.btn-ghost:hover:not(:disabled){background:var(--white);border-color:var(--gray);color:#3a4a5a;}
.btn-green{background:var(--green);color:var(--white);box-shadow:0 3px 12px rgba(123,26,46,0.28);}
.btn-green:hover:not(:disabled){background:#245f27;}

.score-card{background:var(--lgreen);border:1.5px solid var(--green);border-radius:12px;padding:16px 18px;margin-top:12px;}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(123,26,46,0.15);}
.score-row:last-child{border-bottom:none;}
.score-name{font-size:13px;color:#1a2535;font-weight:600;}
.score-val{font-size:14px;color:var(--green);font-weight:700;}
.score-interp{font-size:12px;color:var(--gray);margin-left:8px;font-weight:500;}

/* Final screen */
.success-circle{width:84px;height:84px;background:var(--lgreen);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:44px;}
.success-title{font-family:'Libre Baskerville',serif;font-size:26px;color:var(--navy);margin-bottom:8px;text-align:center;}
.success-sub{text-align:center;color:var(--gray);font-size:14px;line-height:1.6;margin-bottom:20px;}
.send-status{font-size:13px;margin-top:10px;padding:10px 14px;border-radius:8px;display:none;}
.send-status.show{display:block;}
.send-status.ok{background:var(--lgreen);color:var(--green);}
.send-status.err{background:var(--lred);color:var(--red);}

.hide{display:none !important;}

@media (max-width:640px){
  .g2{grid-template-columns:1fr;}
  .stage{padding:0 14px 140px;}
  .card-body{padding:18px 18px;}
  .nrs-btn{height:44px;font-size:14px;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="brand-mark"><span class="sp">Spine</span><span class="me">Me</span><span class="d">d</span></div>
      <div class="brand-sub">Outcome Assessments</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-step-lbl" id="hdrStepLbl">Setup</div>
      <div class="hdr-step-name" id="hdrStepName">Select assessments</div>
    </div>
  </div>
  <div class="prog-dots" id="progDots"></div>
</div>

<!-- SCREEN 1: STAFF SETUP -->
<div class="stage" id="screenSetup">
  <div class="card">
    <div class="card-hdr">
      <h1>Outcome Assessment Battery</h1>
      <p>Select the assessments to administer, then hand the iPad to the patient.</p>
    </div>
    <div class="card-body">
      <div class="fg g2">
        <div class="f">
          <label>Patient Name</label>
          <input class="fi" id="pt_name" placeholder="First and last name">
        </div>
        <div class="f">
          <label>Assessment Date</label>
          <input class="fi" id="pt_date" type="date">
        </div>
      </div>

      <div class="sec-lbl">Select Assessments</div>
      <div class="ck-list" id="assessmentList"></div>
    </div>
  </div>
</div>

<!-- SCREEN 2: ASSESSMENT (content rendered dynamically) -->
<div class="stage hide" id="screenAssessment">
  <div class="card">
    <div class="card-hdr" id="assessHdr">
      <h2 id="assessTitle"></h2>
      <p id="assessIntro"></p>
    </div>
    <div class="card-body" id="assessBody"></div>
  </div>
</div>

<!-- SCREEN 3: DONE -->
<div class="stage hide" id="screenDone">
  <div class="card">
    <div class="card-body" style="padding:36px 24px;">
      <div class="success-circle">✓</div>
      <div class="success-title">Thank you!</div>
      <div class="success-sub">Your responses have been recorded.<br>A staff member will review the results with you.</div>

      <div class="sec-lbl">Score Summary</div>
      <div id="scoreSummary"></div>

      <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-navy" onclick="savePdfs()" id="savePdfBtn">⬇ Save PDFs</button>
        <button class="btn btn-green" onclick="sendToOffice()" id="sendBtn">✉ Send to Office</button>
      </div>
      <div class="send-status" id="sendStatus"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAVBAR -->
<div class="navbar" id="navbar">
  <div class="navbar-inner">
    <div class="navbar-status" id="navStatus">Ready</div>
    <div class="btn-row" id="navBtns">
      <button class="btn btn-ghost hide" id="btnBack" onclick="goBack()">← Back</button>
      <button class="btn btn-navy" id="btnNext" onclick="goNext()" disabled>Begin Assessment →</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// ASSESSMENT DEFINITIONS
// ═══════════════════════════════════════════════════════════════════

// Helper to make a 0–5 radio list (shared format)
const R6 = (opts) => opts.map((text,i)=>({val:i,text}));

const ODI_SECTIONS = [
  { title:'Pain Intensity', opts:R6(['The pain comes and goes and is very mild.','The pain is mild and does not vary much.','The pain comes and goes and is moderate.','The pain is moderate and does not vary much.','The pain is severe but comes and goes.','The pain is severe and does not vary much.']) },
  { title:'Personal Care (washing, dressing, etc.)', opts:R6(['I can look after myself normally without causing extra pain.','I can look after myself normally but it causes extra pain.','It is painful to look after myself and I am slow and careful.','I need some help but manage most of my personal care.','I need help every day in most aspects of self care.','I do not get dressed, wash with difficulty and stay in bed.']) },
  { title:'Lifting', opts:R6(['I can lift heavy weights without extra pain.','I can lift heavy weights but it gives extra pain.','Pain prevents me from lifting heavy weights off the floor, but I can manage if they are conveniently positioned (e.g., on a table).','Pain prevents me from lifting heavy weights, but I can manage light to medium weights if conveniently positioned.','I can lift very light weights.','I cannot lift or carry anything at all.']) },
  { title:'Walking', opts:R6(['Pain does not prevent me walking any distance.','Pain prevents me walking more than 1 mile.','Pain prevents me walking more than 1/4 mile.','Pain prevents me walking more than 100 yards.','I can only walk using a stick or crutches.','I am in bed most of the time.']) },
  { title:'Sitting', opts:R6(['I can sit in any chair as long as I like.','I can only sit in my favorite chair as long as I like.','Pain prevents me from sitting more than 1 hour.','Pain prevents me from sitting more than 30 minutes.','Pain prevents me from sitting more than 10 minutes.','Pain prevents me from sitting at all.']) },
  { title:'Standing', opts:R6(['I can stand as long as I want without extra pain.','I can stand as long as I want but it gives me extra pain.','Pain prevents me from standing more than 1 hour.','Pain prevents me from standing more than 30 minutes.','Pain prevents me from standing more than 10 minutes.','Pain prevents me from standing at all.']) },
  { title:'Sleeping', opts:R6(['My sleep is never disturbed by pain.','My sleep is occasionally disturbed by pain.','Because of pain I have less than 6 hours sleep.','Because of pain I have less than 4 hours sleep.','Because of pain I have less than 2 hours sleep.','Pain prevents me from sleeping at all.']) },
  { title:'Sex Life (if applicable)', opts:R6(['My sex life is normal and causes no extra pain.','My sex life is normal but causes some extra pain.','My sex life is nearly normal but is very painful.','My sex life is severely restricted by pain.','My sex life is nearly absent because of pain.','Pain prevents any sex life at all.']), optional:true },
  { title:'Social Life', opts:R6(['My social life is normal and gives me no extra pain.','My social life is normal but increases the degree of pain.','Pain has no significant effect on my social life apart from limiting energetic interests (e.g., sport).','Pain has restricted my social life and I do not go out as often.','Pain has restricted my social life to my home.','I have no social life because of pain.']) },
  { title:'Traveling', opts:R6(['I can travel anywhere without pain.','I can travel anywhere but it gives me extra pain.','Pain is bad but I manage journeys over 2 hours.','Pain restricts me to journeys of less than 1 hour.','Pain restricts me to short necessary journeys under 30 minutes.','Pain prevents me from traveling except to receive treatment.']) }
];

const NDI_SECTIONS = [
  { title:'Pain Intensity', opts:R6(['I have no pain at the moment.','The pain is very mild at the moment.','The pain is moderate at the moment.','The pain is fairly severe at the moment.','The pain is very severe at the moment.','The pain is the worst imaginable at the moment.']) },
  { title:'Personal Care (washing, dressing, etc.)', opts:R6(['I can look after myself normally without causing extra pain.','I can look after myself normally but it causes extra pain.','It is painful to look after myself and I am slow and careful.','I need some help but manage most of my personal care.','I need help every day in most aspects of self care.','I do not get dressed, I wash with difficulty and stay in bed.']) },
  { title:'Lifting', opts:R6(['I can lift heavy weights without extra pain.','I can lift heavy weights but it gives extra pain.','Pain prevents me from lifting heavy weights off the floor, but I can manage if they are conveniently positioned (e.g., on a table).','Pain prevents me from lifting heavy weights, but I can manage light to medium weights if conveniently positioned.','I can lift very light weights.','I cannot lift or carry anything at all.']) },
  { title:'Reading', opts:R6(['I can read as much as I want with no pain in my neck.','I can read as much as I want with slight pain in my neck.','I can read as much as I want with moderate pain in my neck.','I cannot read as much as I want because of moderate pain in my neck.','I can hardly read at all because of severe pain in my neck.','I cannot read at all.']) },
  { title:'Headaches', opts:R6(['I have no headaches at all.','I have slight headaches which come infrequently.','I have moderate headaches which come infrequently.','I have moderate headaches which come frequently.','I have severe headaches which come frequently.','I have headaches almost all the time.']) },
  { title:'Concentration', opts:R6(['I can concentrate fully when I want to with no difficulty.','I can concentrate fully when I want to with slight difficulty.','I have a fair degree of difficulty concentrating when I want to.','I have a lot of difficulty concentrating when I want to.','I have a great deal of difficulty concentrating when I want to.','I cannot concentrate at all.']) },
  { title:'Work', opts:R6(['I can do as much work as I want.','I can only do my usual work but no more.','I can do most of my usual work but no more.','I cannot do my usual work.','I can hardly do any work at all.','I cannot do any work at all.']) },
  { title:'Driving', opts:R6(['I can drive my car without any neck pain.','I can drive my car as long as I want with slight pain in my neck.','I can drive my car as long as I want with moderate pain in my neck.','I cannot drive my car as long as I want because of moderate pain in my neck.','I can hardly drive at all because of severe pain in my neck.','I cannot drive my car at all.']) },
  { title:'Sleeping', opts:R6(['I have no trouble sleeping.','My sleep is slightly disturbed (less than 1 hour sleepless).','My sleep is mildly disturbed (1–2 hours sleepless).','My sleep is moderately disturbed (2–3 hours sleepless).','My sleep is greatly disturbed (3–5 hours sleepless).','My sleep is completely disturbed (5–7 hours sleepless).']) },
  { title:'Recreation', opts:R6(['I am able to engage in all my recreational activities with no neck pain at all.','I am able to engage in all my recreational activities with some pain in my neck.','I am able to engage in most but not all my usual recreational activities because of pain in my neck.','I am able to engage in a few of my usual recreational activities because of pain in my neck.','I can hardly do any recreational activities because of pain in my neck.','I cannot do any recreational activities at all.']) }
];

const PDI_ITEMS = [
  'Family/Home Responsibilities — chores, yard work, errands for family',
  'Recreation — hobbies, sports, leisure',
  'Social Activity — activities with friends/acquaintances other than family',
  'Occupation — work, ability to perform job (or ability to work if currently unemployed)',
  'Sexual Behavior — frequency and quality of sex life',
  'Self-Care — personal maintenance, hygiene, grooming',
  'Life-Support Activity — eating, sleeping, breathing'
];

const HDI_ITEMS = [
  'Because of my headaches I feel handicapped.',
  'Because of my headaches I feel restricted in performing my routine daily activities.',
  'No one understands the effect my headaches have on my life.',
  'I restrict my recreational activities (e.g., sports, hobbies) because of my headaches.',
  'My headaches make me angry.',
  'Sometimes I feel that I am going to lose control because of my headaches.',
  'Because of my headaches I am less likely to socialize.',
  'My spouse (significant other), or family and friends, have no idea what I am going through because of my headaches.',
  'My headaches are so bad that I feel that I am going to go insane.',
  'My outlook on the world is affected by my headaches.',
  'I am afraid to go outside when I feel that a headache is starting.',
  'I feel desperate because of my headaches.',
  'I am concerned that I am paying penalties at work or at home because of my headaches.',
  'My headaches place stress on my relationships with family or friends.',
  'I avoid being in bright light because of my headaches.',
  'I feel that I have little control over my life because of my headaches.',
  'Because of my headaches I avoid exerting myself.',
  'I avoid going to social events after work because of my headaches.',
  'I feel that there is nothing I can do to help myself during a headache.',
  'Sometimes I am concerned that I am going crazy because of my headaches.',
  'Because of my headaches I do not enjoy recreational activities.',
  'I worry that my headaches will get worse.',
  'I avoid traveling because of my headaches.',
  'I feel that no one cares about my problem.',
  'I avoid making plans because of my headaches.'
];

const UEFI_ITEMS = [
  'Any of your usual work, housework, or school activities',
  'Your usual hobbies, recreational or sporting activities',
  'Lifting a bag of groceries to waist level',
  'Lifting a bag of groceries above your head',
  'Grooming your hair',
  'Pushing up on your hands (e.g., from bathtub or chair)',

    score: function(answers){
      let sum=0, answered=0;
      for (let i=0;i<ODI_SECTIONS.length;i++){
        const a=answers[i];
        if (a==null || a==='na') continue;
        sum += Number(a); answered++;

      const denom = answered*5;
      const pct = denom===0?0:Math.round((sum/denom)*100);
      let band = 'Minimal';
      if (pct>80) band='Bed-bound';
      else if (pct>60) band='Crippling';
      else if (pct>40) band='Severe';
      else if (pct>20) band='Moderate';

let state = {

// ═══════════════════════════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════════════════════════
function initSetup(){
  // Date default = today
  const now = new Date();
  const iso = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('pt_date').value = iso;

  // Build assessment checklist
  const list = document.getElementById('assessmentList');
  list.innerHTML = '';
  ASSESSMENT_ORDER.forEach(function(id){
    const a = ASSESSMENTS[id];
    const row = document.createElement('label');
    row.className = 'ck';
    row.dataset.id = id;
    row.innerHTML = '<input type="checkbox" data-id="'+id+'"><div class="ck-text"><b>'+a.name+'</b> <span class="ck-sub">'+a.short+'</span></div>';
    row.querySelector('input').addEventListener('change', function(e){
      row.classList.toggle('on', e.target.checked);
      updateBeginButton();
    });
    list.appendChild(row);
  });

  document.getElementById('pt_name').addEventListener('input', updateBeginButton);

  // Brand toggle
  document.querySelectorAll('.brand-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ setBrand(btn.dataset.brand); });
  });
  updateBrandUI();

  updateBeginButton();
}

function updateBeginButton(){
  const name = document.getElementById('pt_name').value.trim();
  const checked = document.querySelectorAll('#assessmentList input[type=checkbox]:checked').length;
  const btn = document.getElementById('btnNext');
  const ready = name && checked>0;
  btn.disabled = !ready;
  document.getElementById('navStatus').textContent = ready
    ? checked + ' assessment' + (checked===1?'':'s') + ' selected'
    : 'Enter patient name and select at least one assessment';
}

function startAssessments(){
  state.patient = document.getElementById('pt_name').value.trim();
  state.date = document.getElementById('pt_date').value;
  state.selected = Array.from(document.querySelectorAll('#assessmentList input[type=checkbox]:checked')).map(el=>el.dataset.id);
  state.idx = 0;
  state.answers = {};
  state.selected.forEach(function(id){
    const a = ASSESSMENTS[id];
    if (a.type==='spadi') state.answers[id] = { pain:new Array(a.pain.length).fill(null), dis:new Array(a.dis.length).fill(null) };
    else if (a.type==='ace') state.answers[id] = {
      phys: new Array(ACE_PHYSICAL.length).fill(null),
      cog:  new Array(ACE_COGNITIVE.length).fill(null),
      emo:  new Array(ACE_EMOTIONAL.length).fill(null),
      sleep:new Array(ACE_SLEEP.length).fill(null),
      overall: null
    };
    else if (a.type==='ledd') {
      state.answers[id] = {};
      LEDD_CATEGORIES.forEach(function(cat){
        state.answers[id][cat.key] = new Array(cat.items.length).fill(null);
      });
    }
    else if (a.type==='radio6') state.answers[id] = new Array(a.sections.length).fill(null);
    else state.answers[id] = new Array(a.items.length).fill(null);
  });
  state.screen = 'assess';
  renderAssessment();
}

// ═══════════════════════════════════════════════════════════════════
// ASSESSMENT RENDERING
// ═══════════════════════════════════════════════════════════════════
function renderAssessment(){
  document.getElementById('screenSetup').classList.add('hide');
  document.getElementById('screenDone').classList.add('hide');
  document.getElementById('screenAssessment').classList.remove('hide');

  const id = state.selected[state.idx];
  const a = ASSESSMENTS[id];

  document.getElementById('hdrStepLbl').textContent = state.patient + ' · ' + (state.idx+1) + ' of ' + state.selected.length;
  document.getElementById('hdrStepName').textContent = a.name;
  document.getElementById('assessTitle').textContent = a.name + ' (' + a.short + ')';
  document.getElementById('assessIntro').textContent = a.intro;
  renderProgress();

  const body = document.getElementById('assessBody');
  body.innerHTML = '';
  body.scrollTop = 0;
  window.scrollTo(0,0);

  if (a.type==='radio6') renderRadio6(body, a, id);
  else if (a.type==='nrs10') renderNrs10(body, a, id);
  else if (a.type==='ysn') renderYsn(body, a, id);
  else if (a.type==='lik5') renderLik5(body, a, id);
  else if (a.type==='spadi') renderSpadi(body, a, id);
  else if (a.type==='ace') renderAce(body, a, id);
  else if (a.type==='ledd') renderLedd(body, a, id);

  // Nav buttons
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');
  btnBack.classList.toggle('hide', state.idx===0);
  const isLast = state.idx === state.selected.length-1;
  btnNext.textContent = isLast ? 'Submit All ✓' : 'Next Assessment →';
  btnNext.className = 'btn ' + (isLast?'btn-green':'btn-navy');
  btnNext.disabled = false;
  updateNavStatus();
}

function renderProgress(){
  const dots = document.getElementById('progDots');
  dots.innerHTML = '';
  state.selected.forEach(function(_,i){
    const d = document.createElement('div');
    d.className = 'dot' + (i<state.idx?' done':'') + (i===state.idx?' active':'');
    dots.appendChild(d);
  });
}

function renderRadio6(body, a, id){
  a.sections.forEach(function(sec, i){
    const block = document.createElement('div');
    block.className = 'q-block';
    let html = '<div><span class="q-num">'+(i+1)+'</span><span class="q-title">'+sec.title+'</span></div>';
    html += '<div class="opt-list">';
    sec.opts.forEach(function(o){
      const on = state.answers[id][i]===o.val;
      html += '<div class="opt'+(on?' on':'')+'" data-i="'+i+'" data-v="'+o.val+'"><div class="opt-dot"></div><div class="opt-text"><b>'+o.val+'</b>'+o.text+'</div></div>';
    });
    if (sec.optional){
      const on = state.answers[id][i]==='na';
      html += '<div class="opt'+(on?' on':'')+'" data-i="'+i+'" data-v="na"><div class="opt-dot"></div><div class="opt-text"><b>N/A</b>Not applicable</div></div>';
    }
    html += '</div>';
    block.innerHTML = html;
    block.querySelectorAll('.opt').forEach(function(el){
      el.addEventListener('click', function(){
        const ii = +el.dataset.i;
        const v = el.dataset.v === 'na' ? 'na' : +el.dataset.v;
        state.answers[id][ii] = v;
        block.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));
        el.classList.add('on');
        updateNavStatus();
      });
    });
    body.appendChild(block);
  });
}

function renderNrs10(body, a, id){
  a.items.forEach(function(item, i){
    const block = document.createElement('div');
    block.className = 'q-block';
    let html = '<div><span class="q-num">'+(i+1)+'</span><span class="q-title">'+item+'</span></div>';
    html += '<div class="nrs-wrap"><div class="nrs-row">';
    for (let n=0;n<=10;n++){
      const on = state.answers[id][i]===n;
      html += '<button class="nrs-btn'+(on?' on':'')+'" data-i="'+i+'" data-v="'+n+'">'+n+'</button>';
    }
    html += '</div><div class="nrs-ends"><span>0 — No disability</span><span>10 — Worst disability</span></div></div>';
    block.innerHTML = html;
    block.querySelectorAll('.nrs-btn').forEach(function(el){
      el.addEventListener('click', function(){
        const ii = +el.dataset.i;
        state.answers[id][ii] = +el.dataset.v;
        block.querySelectorAll('.nrs-btn').forEach(x=>x.classList.remove('on'));
        el.classList.add('on');
        updateNavStatus();
      });
    });
    body.appendChild(block);
  });
}

function renderYsn(body, a, id){
  a.items.forEach(function(item, i){
    const block = document.createElement('div');
    block.className = 'q-block';
    const cur = state.answers[id][i];
    let html = '<div><span class="q-num">'+(i+1)+'</span><span class="q-title">'+item+'</span></div>';
    html += '<div class="ysn-row">'
      +'<button class="ysn-btn'+(cur===4?' on':'')+'" data-v="4">Yes</button>'

      +'<button class="ysn-btn'+(cur===0?' on':'')+'" data-v="0">No</button>'
      +'</div>';
    block.innerHTML = html;
    block.querySelectorAll('.ysn-btn').forEach(function(el){
      el.addEventListener('click', function(){
        state.answers[id][i] = +el.dataset.v;
        block.querySelectorAll('.ysn-btn').forEach(x=>x.classList.remove('on'));
        el.classList.add('on');
        updateNavStatus();
      });
    });
    body.appendChild(block);
  });
}

function renderLik5(body, a, id){

      const on = state.answers[id][i]===o.val;

    html += '</div>';
    block.innerHTML = html;
    block.querySelectorAll('.lik-btn').forEach(function(el){

function updateNavStatus(){
  if (state.screen!=='assess'){ return; }
  const id = state.selected[state.idx];
  const a = ASSESSMENTS[id];
  const ans = state.answers[id];
  let answered, total;
  if (a.type==='spadi'){
    total = a.pain.length + a.dis.length;
    answered = ans.pain.filter(v=>v!=null).length + ans.dis.filter(v=>v!=null).length;
  } else if (a.type==='ace'){
    total = ACE_PHYSICAL.length + ACE_COGNITIVE.length + ACE_EMOTIONAL.length + ACE_SLEEP.length + 1; // +1 for overall
    answered = ans.phys.filter(v=>v!=null).length + ans.cog.filter(v=>v!=null).length + ans.emo.filter(v=>v!=null).length + ans.sleep.filter(v=>v!=null).length + (ans.overall!=null?1:0);
  } else if (a.type==='ledd'){
    total = 0; answered = 0;
    LEDD_CATEGORIES.forEach(function(cat){
      total += cat.items.length;
      answered += (ans[cat.key]||[]).filter(v=>v!=null).length;
    });
  } else if (a.type==='radio6'){
    total = a.sections.length;
    answered = ans.filter(v=>v!=null).length;
  } else {
    total = a.items.length;
    answered = ans.filter(v=>v!=null).length;
  }
  document.getElementById('navStatus').innerHTML = 'Answered <b>'+answered+'</b> of <b>'+total+'</b>';
}

function goNext(){
  if (state.screen==='setup'){ startAssessments(); return; }
  if (state.screen!=='assess') return;
  if (state.idx === state.selected.length-1){
    finishAll();
  } else {
    state.idx++;
    renderAssessment();
  }
}
function goBack(){
  if (state.screen!=='assess') return;
  if (state.idx>0){ state.idx--; renderAssessment(); }
}

function finishAll(){
  state.screen='done';
  document.getElementById('screenAssessment').classList.add('hide');
  document.getElementById('screenDone').classList.remove('hide');
  document.getElementById('navbar').classList.add('hide');
  document.getElementById('hdrStepLbl').textContent = state.patient;
  document.getElementById('hdrStepName').textContent = 'Complete';
  // Mark all progress dots done
  document.querySelectorAll('#progDots .dot').forEach(function(d){d.classList.remove('active');d.classList.add('done');});

  const sum = document.getElementById('scoreSummary');
  sum.innerHTML='';
  const card = document.createElement('div');
  card.className='score-card';
  state.selected.forEach(function(id){
    const a = ASSESSMENTS[id];
    const s = a.score(state.answers[id]);
    const row = document.createElement('div');
    row.className='score-row';
    let valText = '';
    if (id==='spadi') valText = s.pct+'% (Pain '+s.pain+'% · Disability '+s.dis+'%)';
    else if (id==='uefi'||id==='lefs') valText = s.raw+' / '+s.denom;
    else if (id==='pdi') valText = s.raw+' / 70';
    else if (id==='hdi') valText = s.raw+' / 100';
    else if (id==='ace') valText = s.raw+' / 22 symptoms' + (s.overall!=null?' · Overall '+s.overall+'/6':'');
    else if (id==='ledd') valText = s.raw+' / '+s.denom+' ('+s.pct+'%)';
    else valText = s.pct+'%';
    row.innerHTML = '<div class="score-name">'+a.short+' — '+a.name+'</div>'
      + '<div class="score-val">'+valText+' <span class="score-interp">· '+s.band+'</span></div>';
    card.appendChild(row);
  });
  sum.appendChild(card);
  window.scrollTo(0,0);
}

  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return m+'/'+d+'/'+y;
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function buildPdfBlobFor(id){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-10000px;top:0;width:816px;background:#fff;z-index:-1;';
  wrap.innerHTML = buildPdfHtml(id);
  document.body.appendChild(wrap);
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
    await new Promise(r=>setTimeout(r,200));
    if (!(window.jspdf && window.jspdf.jsPDF)) throw new Error('jsPDF 2.x not loaded');
    const JsPDF = window.jspdf.jsPDF;
    const canvas = await html2canvas(wrap.firstElementChild, {scale:2, useCORS:true, logging:false, backgroundColor:'#ffffff'});
    if (!canvas || !canvas.width || !canvas.height) throw new Error('empty canvas');
    const pdf = new JsPDF({unit:'in',format:'letter',orientation:'portrait'});
    const pageW = 8.5, pageH = 11;
    const imgW = pageW;
    const imgH = pageW * (canvas.height / canvas.width);
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    if (imgH <= pageH){
      pdf.addImage(imgData, 'JPEG', 0, 0, imgW, imgH);
    } else {
      // Paginate tall content
      let yOff = 0;
      while (yOff < imgH){
        pdf.addImage(imgData, 'JPEG', 0, -yOff, imgW, imgH);
        yOff += pageH;
        if (yOff < imgH) pdf.addPage('letter','portrait');
      }
    }
    return pdf.output('blob');
  } finally {
    if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
  }
}

function blobToBase64(blob){
  return new Promise(function(resolve, reject){
    const r = new FileReader();
    r.onload = function(){ resolve(r.result.split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

async function savePdfs(){
  const btn = document.getElementById('savePdfBtn');
  const status = document.getElementById('sendStatus');
  btn.disabled = true; btn.textContent='Building PDFs…';
  status.className='send-status';
  try {
    for (const id of state.selected){
      btn.textContent = 'Saving '+ASSESSMENTS[id].short+'…';
      const blob = await buildPdfBlobFor(id);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filenameFor(id);
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 2000);
    }
    btn.textContent='✓ Saved';
    setTimeout(()=>{ btn.disabled=false; btn.textContent='⬇ Save PDFs'; }, 2500);
  } catch (err) {
    console.error('savePdfs:',err);
    btn.disabled=false; btn.textContent='⬇ Save PDFs';
    status.className='send-status show err'; status.textContent='Save failed: '+(err.message||err);
  }
}

const WORKER_URL = 'https://cig-intake.drberns.workers.dev/packet-submit';
const WORKER_SECRET = '';

async function sendToOffice(){
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('sendStatus');
  btn.disabled = true; btn.textContent='Building PDFs…';
  status.className='send-status';
  try {
    const sent = [];
    for (const id of state.selected){
      const a = ASSESSMENTS[id];
      btn.textContent='Sending '+a.short+'…';
      const blob = await buildPdfBlobFor(id);
      const b64 = await blobToBase64(blob);
      const fn = filenameFor(id);
      const subject = getBrand().name+' Outcome Assessment — '+a.short+' — '+state.patient+' — '+prettyDate(state.date);
      const resp = await fetch(WORKER_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          patientName: state.patient,
          dateOfLoss: state.date,
          pdfBase64: b64,
          pdfFilename: fn,
          subject: subject
        })
      });
      const text = await resp.text();
      let result; try { result = JSON.parse(text); } catch(e){ throw new Error('HTTP '+resp.status+': '+text.slice(0,200)); }
      if (!resp.ok || !result.success) throw new Error(a.short+' — HTTP '+resp.status+': '+(result.error||text.slice(0,200)||'unknown'));
      sent.push(a.short);
    }
    btn.textContent='✓ Sent';
    status.className='send-status show ok';
    status.textContent='Sent to front desk: '+sent.join(', ');
  } catch (err) {
    console.error('sendToOffice:',err);
    btn.disabled=false; btn.textContent='✉ Send to Office';
    status.className='send-status show err'; status.textContent='Send failed — '+(err.message||err);
  }
}
