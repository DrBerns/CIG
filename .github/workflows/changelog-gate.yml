name: Changelog Gate

# Fail any PR that touches site files without a CHANGELOG.md update.
# Policy: every change to HTML, JS, CSS, or workflows MUST include
# a CHANGELOG.md entry in the same PR.

on:
  pull_request:
    branches:
      - main
    paths:
      - '*.html'
      - '*.js'
      - '*.css'
      - '.github/workflows/**'

jobs:
  changelog-check:
    name: Require CHANGELOG.md update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was updated
        run: |
          if git diff --name-only origin/main...HEAD | grep -q "^CHANGELOG\.md$"; then
            echo "✅ CHANGELOG.md updated — gate passed"
          else
            echo "❌ CHANGELOG.md was NOT updated."
            echo ""
            echo "Policy: every change to HTML, JS, CSS, or workflows"
            echo "MUST include a CHANGELOG.md entry in the same PR."
            echo ""
            echo "Add an entry under the current date and re-push."
            exit 1
          fi
