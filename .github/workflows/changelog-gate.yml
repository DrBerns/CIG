name: Changelog Gate

# Fail any PR that touches code without updating all three required docs.
# Policy: every change to HTML, JS, CSS, or workflows MUST include updates
# to CHANGELOG.md, docs/BACKLOG.md, AND docs/SESSION_STATE.md in the same PR.
# Nothing is on honor system.

on:
  pull_request:
    branches:
      - main
    paths:
      - '*.html'
      - '*.js'
      - '*.css'
      - '.github/workflows/**'

jobs:
  changelog-check:
    name: Require CHANGELOG + BACKLOG + SESSION_STATE update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check all required docs were updated
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          MISSING=()

          echo "$CHANGED" | grep -q "^CHANGELOG\.md$"            || MISSING+=("CHANGELOG.md")
          echo "$CHANGED" | grep -q "^docs/BACKLOG\.md$"         || MISSING+=("docs/BACKLOG.md")
          echo "$CHANGED" | grep -q "^docs/SESSION_STATE\.md$"   || MISSING+=("docs/SESSION_STATE.md")

          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "✅ All required docs updated — gate passed"
            echo "   CHANGELOG.md ✅  docs/BACKLOG.md ✅  docs/SESSION_STATE.md ✅"
          else
            echo "❌ Missing required doc updates: ${MISSING[*]}"
            echo ""
            echo "Policy: every code change MUST update all three docs in the same PR:"
            echo "  CHANGELOG.md          — what changed and why"
            echo "  docs/BACKLOG.md       — mark completed items; add newly identified items"
            echo "  docs/SESSION_STATE.md — update 'where we are right now'"
            exit 1
          fi
